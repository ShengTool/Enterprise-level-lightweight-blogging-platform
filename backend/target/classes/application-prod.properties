# ============================================
# LiteBlog Backend Production Configuration
# ============================================

# Datasource Configuration - Production
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/liteblog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# HikariCP Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000

# JPA Configuration - Production
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration - Production
# WARNING: JWT_SECRET must be at least 256 bits (32 characters) in production
jwt.secret=${JWT_SECRET:}
# 1 hour (3600000 milliseconds)
jwt.expiration=${JWT_EXPIRATION:3600000}

# CORS Configuration - Production
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# File Upload Configuration
file.upload.path=${FILE_UPLOAD_PATH:/app/uploads}
file.upload.max-size=10MB

# Admin Configuration
admin.default-password=${ADMIN_DEFAULT_PASSWORD:}
admin.email=${ADMIN_EMAIL:admin@liteblog.com}

# Logging - Production
logging.level.root=WARN
logging.level.com.example.blog=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
