# ============================================
# LiteBlog Backend Development Configuration
# ============================================

# Datasource Configuration - Development
spring.datasource.url=jdbc:mysql://localhost:3306/liteblog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# HikariCP Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# JPA Configuration - Development
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# JWT Configuration - Development
# WARNING: This is a development-only secret. In production, use a strong secret from environment variable.
jwt.secret=dev-secret-key-for-development-only-change-in-production-minimum-256-bits-please-use-strong-secret-in-production
# 1 hour for development (3600000 milliseconds)
jwt.expiration=3600000

# CORS Configuration - Development
cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:3000

# File Upload Configuration
file.upload.path=./uploads

# Logging - Development
logging.level.root=INFO
logging.level.com.example.blog=DEBUG
